name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint e Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 app tests

      - name: Testes (pytest + cobertura)
        run: pytest --cov=app --cov-report=term-missing

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t flask-api:ci .

  terraform-validate:
    name: Validacao Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Checagem de formatacao
        run: terraform -chdir=infra fmt -check

      - name: Inicializar (sem backend)
        run: terraform -chdir=infra init -backend=false

      - name: Validar configuracao
        run: terraform -chdir=infra validate
