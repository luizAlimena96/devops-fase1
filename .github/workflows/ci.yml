name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devops-fase1-api
  PROJECT_NAME: devops-fase1-api

jobs:
  lint-and-test:
    name: Lint e Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 app tests

      - name: Testes (pytest + cobertura)
        run: pytest --cov=app --cov-report=term-missing

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t flask-api:ci .

  terraform-validate:
    name: Validacao Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Checagem de formatacao
        run: terraform -chdir=infra fmt -check

      - name: Inicializar (sem backend)
        run: terraform -chdir=infra init -backend=false

      - name: Validar configuracao
        run: terraform -chdir=infra validate

  # ---------- NOVO NA FASE 2: Entrega Continua (CD) ----------
  deploy:
    name: Deploy Continuo (CD)
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build, terraform-validate]
    # So implanta em push direto na main; pull requests apenas validam.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag e push da imagem
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Implantar na EC2 via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=$PROJECT_NAME" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)
          echo "Instancia alvo: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --comment "Deploy $GITHUB_SHA" \
            --parameters 'commands=["/opt/app/deploy.sh"]' \
            --query "Command.CommandId" --output text)
          echo "Comando SSM enviado: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"

          echo "----- Saida do deploy na instancia -----"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text
