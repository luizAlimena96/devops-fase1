# Orquestracao do container da API.
#
# Uso local:   docker compose up --build      (constroi a imagem a partir do Dockerfile)
# Uso no host: ECR_IMAGE=<url-do-ecr>:latest docker compose pull && docker compose up -d
#
# Na EC2, o arquivo equivalente e gerado automaticamente por infra/user_data.sh
# com a URL do ECR e a porta ja preenchidas.
services:
  api:
    image: ${ECR_IMAGE:-flask-api:local}
    build: .
    container_name: flask-api
    restart: always
    ports:
      - "${APP_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
