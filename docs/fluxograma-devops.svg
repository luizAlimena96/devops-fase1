<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="840" viewBox="0 0 1140 840" font-family="Helvetica, Arial, sans-serif">
  <!-- Fluxograma do fluxo DevOps: do commit do desenvolvedor ate a app no ar -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#37474f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1140" height="840" fill="#ffffff"/>
  <text x="570" y="44" text-anchor="middle" font-size="28" font-weight="bold" fill="#263238">Fluxo DevOps - Fase 1 e Fase 2</text>

  <!-- Desenvolvedor -->
  <rect x="460" y="70" width="220" height="56" rx="10" fill="#cfd8dc" stroke="#546e7a" stroke-width="2"/>
  <text x="570" y="104" text-anchor="middle" font-size="20" font-weight="bold" fill="#263238">Desenvolvedor</text>

  <!-- push -->
  <line x1="570" y1="126" x2="570" y2="168" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="586" y="152" font-size="15" fill="#37474f">git push (main)</text>

  <!-- CI lane -->
  <rect x="60" y="170" width="1020" height="150" rx="14" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="80" y="198" font-size="18" font-weight="bold" fill="#0d47a1">CI - Integracao Continua  (push e pull_request)</text>

  <rect x="95" y="214" width="290" height="80" rx="10" fill="#ffffff" stroke="#1976d2" stroke-width="2"/>
  <text x="240" y="248" text-anchor="middle" font-size="17" font-weight="bold" fill="#0d47a1">Lint e Testes</text>
  <text x="240" y="272" text-anchor="middle" font-size="13" fill="#37474f">flake8 + pytest (cobertura)</text>

  <rect x="425" y="214" width="290" height="80" rx="10" fill="#ffffff" stroke="#1976d2" stroke-width="2"/>
  <text x="570" y="248" text-anchor="middle" font-size="17" font-weight="bold" fill="#0d47a1">Build Docker</text>
  <text x="570" y="272" text-anchor="middle" font-size="13" fill="#37474f">valida o Dockerfile</text>

  <rect x="755" y="214" width="290" height="80" rx="10" fill="#ffffff" stroke="#1976d2" stroke-width="2"/>
  <text x="900" y="248" text-anchor="middle" font-size="17" font-weight="bold" fill="#0d47a1">Validacao Terraform</text>
  <text x="900" y="272" text-anchor="middle" font-size="13" fill="#37474f">fmt + init + validate</text>

  <!-- CI -> CD -->
  <line x1="570" y1="320" x2="570" y2="362" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="586" y="346" font-size="15" fill="#37474f">jobs OK + push na main</text>

  <!-- CD lane -->
  <rect x="60" y="364" width="1020" height="150" rx="14" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="80" y="392" font-size="18" font-weight="bold" fill="#1b5e20">CD - Entrega Continua  (somente push na main)</text>

  <rect x="170" y="408" width="320" height="80" rx="10" fill="#ffffff" stroke="#2e7d32" stroke-width="2"/>
  <text x="330" y="442" text-anchor="middle" font-size="17" font-weight="bold" fill="#1b5e20">Build + Push imagem</text>
  <text x="330" y="466" text-anchor="middle" font-size="13" fill="#37474f">tags: github.sha e latest</text>

  <rect x="650" y="408" width="320" height="80" rx="10" fill="#ffffff" stroke="#2e7d32" stroke-width="2"/>
  <text x="810" y="442" text-anchor="middle" font-size="17" font-weight="bold" fill="#1b5e20">Deploy via SSM</text>
  <text x="810" y="466" text-anchor="middle" font-size="13" fill="#37474f">send-command: /opt/app/deploy.sh</text>

  <line x1="490" y1="448" x2="650" y2="448" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- CD -> AWS -->
  <line x1="330" y1="488" x2="330" y2="560" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="200" y="528" font-size="14" fill="#37474f">docker push</text>
  <line x1="810" y1="488" x2="690" y2="560" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="828" y="528" font-size="14" fill="#37474f">aws ssm</text>

  <!-- AWS lane -->
  <rect x="60" y="562" width="1020" height="210" rx="14" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="80" y="590" font-size="18" font-weight="bold" fill="#e65100">AWS</text>

  <!-- ECR -->
  <rect x="150" y="612" width="250" height="80" rx="10" fill="#ffffff" stroke="#ef6c00" stroke-width="2"/>
  <text x="275" y="646" text-anchor="middle" font-size="17" font-weight="bold" fill="#e65100">Amazon ECR</text>
  <text x="275" y="670" text-anchor="middle" font-size="13" fill="#37474f">registro da imagem</text>

  <!-- EC2 -->
  <rect x="470" y="606" width="330" height="110" rx="10" fill="#ffffff" stroke="#ef6c00" stroke-width="2"/>
  <text x="635" y="640" text-anchor="middle" font-size="17" font-weight="bold" fill="#e65100">EC2 (Amazon Linux 2023)</text>
  <text x="635" y="664" text-anchor="middle" font-size="13" fill="#37474f">Docker Compose: container flask-api</text>
  <text x="635" y="686" text-anchor="middle" font-size="13" fill="#37474f">pull -> up -d -> prune  (porta 5000)</text>

  <!-- Usuarios -->
  <rect x="870" y="612" width="180" height="80" rx="10" fill="#ffffff" stroke="#ef6c00" stroke-width="2"/>
  <text x="960" y="646" text-anchor="middle" font-size="17" font-weight="bold" fill="#e65100">Usuarios</text>
  <text x="960" y="670" text-anchor="middle" font-size="13" fill="#37474f">acessam a API</text>

  <!-- ECR -> EC2 -->
  <line x1="400" y1="652" x2="470" y2="655" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="372" y="616" font-size="13" fill="#37474f">docker compose pull</text>

  <!-- EC2 -> Usuarios -->
  <line x1="800" y1="655" x2="870" y2="652" stroke="#37474f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="806" y="616" font-size="13" fill="#37474f">http :5000</text>
</svg>
